# ==============================================================
# SIPebaru Database Backup - GitHub Actions
# ==============================================================
# Cadangkan database Supabase secara otomatis setiap 5 hari.
# Simpan hasil backup sebagai artifact selama 90 hari.
#
# Konfigurasi yang Diperlukan:
# - Tambahkan secret SUPABASE_DB_URL di Settings > Secrets
#   Format: postgresql://postgres:[PASSWORD]@db.[PROJECT_REF].supabase.co:5432/postgres
# ==============================================================

name: Database Backup

on:
  schedule:
    # Jalankan setiap 5 hari pada pukul 00:00 UTC
    - cron: '0 0 */5 * *'
  workflow_dispatch:
    # Izinkan trigger manual dari GitHub UI

jobs:
  backup:
    name: Backup Database PostgreSQL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Buat backup database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # Buat nama file dengan timestamp
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="sipebaru_backup_${TIMESTAMP}.sql"

          echo "📦 Memulai backup database..."
          echo "📅 Timestamp: ${TIMESTAMP}"
          echo "📄 File: ${FILENAME}"

          # Jalankan pg_dump
          pg_dump "$SUPABASE_DB_URL" \
            --no-owner \
            --no-acl \
            --clean \
            --if-exists \
            --format=plain \
            --file="${FILENAME}"

          echo "✅ Backup selesai!"
          echo "📊 Ukuran file: $(du -h ${FILENAME} | cut -f1)"

          # Simpan nama file untuk step selanjutnya
          echo "BACKUP_FILE=${FILENAME}" >> $GITHUB_ENV

      - name: Upload backup sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: sipebaru-database-backup-${{ github.run_number }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
          if-no-files-found: error
